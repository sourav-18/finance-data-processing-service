services:

  postgres:
    image: postgres:16
    container_name: finance-postgres
    restart: always
    environment:
      POSTGRES_DB: finances
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5430:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: finance-redis
    restart: always
    ports:
      - "6370:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    container_name: finance-app
    depends_on:
      - postgres
      - redis
    ports:
      - "4050:4050"
    env_file:
      - ./dockerConfig/.env

volumes:
  postgres-data:
  redis-data: